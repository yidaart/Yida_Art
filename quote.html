<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>艺达·ART报价单</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f5f3f0;
            --surface: #ffffff;
            --surface-raised: #faf9f7;
            --text: #1a1a1a;
            --text-secondary: #666;
            --text-muted: #999;
            --accent: #8b5a2b;
            --accent-light: #c49a6c;
            --accent-soft: rgba(139,90,43,0.08);
            --border: #e5e0da;
            --border-light: #f0ebe5;
            --shadow: 0 2px 8px rgba(0,0,0,0.06);
            --shadow-lg: 0 8px 32px rgba(0,0,0,0.1);
            --radius: 12px;
            --radius-sm: 8px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            min-height: 100vh;
        }

        header {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 18px 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        header h1 {
            font-family: 'Cormorant Garamond', Georgia, serif;
            font-size: 24px;
            font-weight: 500;
        }
        header h1 span { color: var(--accent); }
        header nav { display: flex; gap: 12px; }
        header nav a {
            color: var(--text-secondary);
            text-decoration: none;
            padding: 6px 16px;
            border-radius: 999px;
            font-size: 13px;
            font-weight: 500;
            transition: all 0.2s;
            border: 1px solid var(--border);
        }
        header nav a:hover { border-color: var(--accent-light); color: var(--accent); }
        header nav a.active { background: var(--accent-soft); border-color: var(--accent); color: var(--accent); }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 32px 40px;
        }

        .card {
            background: var(--surface);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
        }

        .card-header {
            padding: 18px 24px;
            border-bottom: 1px solid var(--border-light);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .card-header h2 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 17px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .card-header h2::before {
            content: '';
            width: 3px;
            height: 16px;
            background: var(--accent);
            border-radius: 2px;
        }

        .info-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
            padding: 20px 24px;
            border-bottom: 1px solid var(--border-light);
        }
        .form-group { }
        .form-group label {
            display: block;
            font-size: 11px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--text-secondary);
            margin-bottom: 6px;
        }
        .form-group input, .form-group select {
            width: 100%;
            padding: 9px 12px;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            font-size: 13px;
            background: var(--surface);
            transition: border-color 0.2s;
            font-family: inherit;
        }
        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: var(--accent);
        }

        .remark {
            padding: 12px 24px;
            font-size: 12px;
            color: var(--text-muted);
            border-bottom: 1px solid var(--border-light);
        }

        .btn-group {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            padding: 16px 24px;
        }
        .btn {
            padding: 9px 20px;
            border-radius: var(--radius-sm);
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            border: none;
            font-family: inherit;
        }
        .btn-primary {
            background: var(--accent);
            color: white;
        }
        .btn-primary:hover { background: #7a4f26; }
        .btn-secondary {
            background: var(--surface-raised);
            color: var(--text-secondary);
            border: 1px solid var(--border);
        }
        .btn-secondary:hover { border-color: var(--accent-light); color: var(--accent); }

        .table-wrap {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }
        th {
            background: var(--accent);
            color: white;
            font-weight: 500;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            padding: 12px 16px;
            text-align: left;
        }
        th.seq { width: 5%; text-align: center; }
        th.type { width: 10%; }
        th.params { width: 28%; }
        th.size { width: 14%; }
        th.qty { width: 7%; text-align: center; }
        th.area { width: 10%; text-align: center; }
        th.price { width: 12%; text-align: center; }
        th.image { width: 10%; text-align: center; }
        th.action { width: 5%; text-align: center; }

        td {
            padding: 12px 16px;
            border-bottom: 1px solid var(--border-light);
            font-size: 13px;
            vertical-align: middle;
        }
        tr:nth-child(even) td { background: var(--surface-raised); }
        tr:hover td { background: var(--accent-soft); }

        td.seq { text-align: center; font-weight: 500; color: var(--accent); }
        td.price { text-align: right; }

        .inline-input {
            width: 100%;
            padding: 7px 10px;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            font-size: 13px;
            font-family: inherit;
            background: var(--surface);
        }
        .inline-input:focus { outline: none; border-color: var(--accent); }

        .size-row { display: flex; gap: 8px; }
        .size-row .field { flex: 1; }
        .size-row .field span {
            display: block;
            font-size: 10px;
            color: var(--text-muted);
            margin-bottom: 3px;
        }
        .size-row input { width: 100%; }

        .param-row { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
        .param-row .field { }
        .param-row .field span {
            display: block;
            font-size: 10px;
            color: var(--text-muted);
            margin-bottom: 2px;
        }
        .param-row input { width: 100%; padding: 6px 8px; }

        .image-cell {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .image-thumb {
            width: 50px;
            height: 50px;
            object-fit: cover;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border);
            background: var(--surface-raised);
        }
        .image-upload-btn {
            padding: 5px 12px;
            background: var(--accent-soft);
            border: 1px solid var(--accent-light);
            border-radius: var(--radius-sm);
            font-size: 12px;
            color: var(--accent);
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
        }
        .image-upload-btn:hover { background: var(--accent); color: white; }
        .image-upload-btn input[type="file"] {
            position: absolute;
            inset: 0;
            opacity: 0;
            cursor: pointer;
        }

        .btn-delete {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: none;
            background: transparent;
            color: #ef4444;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }
        .btn-delete:hover { background: #fee2e2; }

        .total-box {
            display: flex;
            justify-content: flex-end;
            padding: 20px 24px;
            border-top: 1px solid var(--border-light);
        }
        .total-inner {
            background: var(--accent-soft);
            border-radius: var(--radius);
            padding: 16px 24px;
            min-width: 320px;
        }
        .total-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 0;
            font-size: 14px;
        }
        .total-row .label { color: var(--text-secondary); }
        .total-row .value { font-weight: 600; color: var(--accent); font-size: 16px; }
        .total-row.big .value { font-size: 22px; font-weight: 600; }

        .footer-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
            padding: 20px 24px;
            border-top: 1px solid var(--border-light);
        }
        .footer-field { display: flex; flex-direction: column; gap: 4px; }
        .footer-field label {
            font-size: 11px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--text-secondary);
        }
        .footer-field .static-text {
            font-size: 13px;
            color: var(--text);
        }
        .footer-field .static-text.addr {
            font-size: 12px;
            color: var(--text-secondary);
        }

        .contact-card {
            display: flex;
            gap: 24px;
            padding: 20px 24px;
            border-top: 1px solid var(--border-light);
            background: var(--surface-raised);
            flex-wrap: wrap;
            align-items: flex-start;
        }
        .contact-item {
            display: flex;
            flex-direction: column;
            gap: 4px;
            min-width: 120px;
        }
        .contact-item label {
            font-size: 11px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--text-secondary);
        }
        .contact-item .value {
            font-size: 14px;
            color: var(--text);
            font-weight: 500;
        }
        .contact-item .value.wechat {
            color: var(--accent);
            font-size: 15px;
        }
        .qr-upload {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .qr-upload label {
            font-size: 11px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--text-secondary);
        }
        .qr-upload .upload-btn {
            padding: 6px 14px;
            background: var(--accent-soft);
            border: 1px dashed var(--accent-light);
            border-radius: var(--radius-sm);
            font-size: 12px;
            color: var(--accent);
            cursor: pointer;
            transition: all 0.2s;
            display: inline-block;
            text-align: center;
        }
        .qr-upload .upload-btn:hover { background: var(--accent); color: white; border-style: solid; }
        .qr-upload input[type="file"] { display: none; }
        .qr-thumb {
            width: 72px;
            height: 72px;
            object-fit: contain;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border);
            background: var(--surface);
            display: none;
        }
        .qr-thumb.show { display: block; }

        /* Export helpers */
        .hide-for-export input[type="text"],
        .hide-for-export input[type="number"],
        .hide-for-export select,
        .hide-for-export .image-upload-btn { display: none !important; }
        .hide-for-export .param-row .field span { display: block !important; }
        .hide-for-export .size-row .field span { display: block !important; }

        input[type=number]::-webkit-inner-spin-button,
        input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        input[type=number] { -moz-appearance: textfield; }

        @media (max-width: 900px) {
            .info-grid { grid-template-columns: repeat(2, 1fr); }
            .footer-grid { grid-template-columns: repeat(2, 1fr); }
        }
        @media (max-width: 640px) {
            header { padding: 14px 20px; flex-direction: column; gap: 10px; }
            .container { padding: 20px; }
            .info-grid { grid-template-columns: 1fr; }
            .param-row { grid-template-columns: 1fr; }
        }
    </style>
    <script>
        const UNIT_PRICE_PER_SQ_METER = 1600;
        const PLACEHOLDER_IMAGE_URL = 'https://placehold.co/100x100/f0f5ff/003366?text=Preview';

        function toChineseNum(num) {
            const chnNumChar = ["零", "壹", "贰", "叁", "肆", "伍", "陆", "柒", "捌", "玖"];
            const chnUnitSection = ["", "万", "亿", "万亿", "亿亿"];
            const chnUnitChar = ["", "拾", "佰", "仟"];
            let unitPos = 0, strIns = '', chnStr = '', needZero = false;
            if (num === 0) return chnNumChar[0] + '元';
            let integerNum = Math.floor(num);
            while (integerNum > 0) {
                let section = integerNum % 10000;
                if (needZero) chnStr = chnNumChar[0] + chnStr;
                strIns = sectionToChinese(section, chnNumChar, chnUnitChar);
                strIns += (section !== 0) ? chnUnitSection[unitPos] : chnUnitSection[0];
                chnStr = strIns + chnStr;
                needZero = (section < 1000 && section > 0);
                integerNum = Math.floor(integerNum / 10000);
                unitPos++;
            }
            chnStr += '元';
            chnStr = chnStr.replace(/^壹拾/, '拾').replace(/零(拾|佰|仟)/g, '零')
                .replace(/零{2,}/g, '零').replace(/零([万亿])/g, '$1')
                .replace(/零+元/, '元').replace(/亿万/, '亿');
            if (chnStr.endsWith('零元')) chnStr = chnStr.slice(0, -2) + '元';
            return chnStr;
        }

        function sectionToChinese(section, chnNumChar, chnUnitChar) {
            let strIns = '', chnStr = '', unitPos = 0, zero = true;
            while (section > 0) {
                let v = section % 10;
                if (v === 0) { if (!zero) { zero = true; chnStr = chnNumChar[v] + chnStr; } }
                else { zero = false; strIns = chnNumChar[v]; strIns += chnUnitChar[unitPos]; chnStr = strIns + chnStr; }
                unitPos++; section = Math.floor(section / 10);
            }
            if (chnStr.endsWith(chnNumChar[0])) chnStr = chnStr.slice(0, -1);
            return chnStr;
        }

        function calculateRow(el) {
            const row = el.closest('tr');
            const w = parseFloat(row.querySelector('.w').value) || 0;
            const h = parseFloat(row.querySelector('.h').value) || 0;
            const q = Math.max(1, parseInt(row.querySelector('.q').value) || 1);
            row.querySelector('.q').value = q;
            const area = (w * h / 10000 * q).toFixed(2);
            row.querySelector('.area').textContent = area;
            if (!row.querySelector('.price').dataset.custom) {
                row.querySelector('.price').value = Math.round(area * UNIT_PRICE_PER_SQ_METER);
            }
            calculateTotal();
        }

        function markCustom(el) {
            el.dataset.custom = 'true';
            calculateTotal();
        }

        function calculateTotal() {
            let totalPrice = 0, totalArea = 0;
            document.querySelectorAll('#quoteBody tr').forEach(row => {
                totalPrice += parseFloat(row.querySelector('.price').value) || 0;
                totalArea += parseFloat(row.querySelector('.area').textContent) || 0;
            });
            document.getElementById('totalPrice').textContent = totalPrice.toFixed(0);
            document.getElementById('totalArea').textContent = totalArea.toFixed(2);
            document.getElementById('totalPriceCN').textContent = toChineseNum(totalPrice);
        }

        function addRow() {
            const tbody = document.getElementById('quoteBody');
            const n = tbody.children.length + 1;
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td class="seq">${n}</td>
                <td><input class="inline-input art-type" value="手绘" oninput="calculateRow(this)"></td>
                <td>
                    <div class="param-row">
                        <div class="field"><span>画芯</span><input class="inline-input core" value="定制画芯"></div>
                        <div class="field"><span>画布</span><input class="inline-input canvas" value="棉麻油画布"></div>
                        <div class="field"><span>外框</span><input class="inline-input outer" value="无框画"></div>
                        <div class="field"><span>内框</span><input class="inline-input inner" value="松木"></div>
                    </div>
                </td>
                <td>
                    <div class="size-row">
                        <div class="field"><span>宽</span><input type="number" class="inline-input w" value="0" min="0" step="0.1" oninput="calculateRow(this)"></div>
                        <div class="field"><span>高</span><input type="number" class="inline-input h" value="0" min="0" step="0.1" oninput="calculateRow(this)"></div>
                    </div>
                </td>
                <td style="text-align:center"><input type="number" class="inline-input q" value="1" min="1" oninput="calculateRow(this)" style="width:60px;text-align:center"></td>
                <td style="text-align:center"><span class="area">0.00</span></td>
                <td style="text-align:right"><input type="number" class="inline-input price" value="0" min="0" oninput="markCustom(this)" style="width:90px;text-align:right"></td>
                <td class="image-cell">
                    <input type="file" accept="image/*" style="display:none" id="img_${Date.now()}" onchange="previewImage(this)">
                    <button class="image-upload-btn" onclick="document.getElementById('img_${Date.now()}').click()">选择文件</button>
                    <img class="image-thumb" src="${PLACEHOLDER_IMAGE_URL}" style="display:none">
                </td>
                <td style="text-align:center">
                    <button class="btn-delete" onclick="removeRow(this)" title="删除">×</button>
                </td>
            `;
            tbody.appendChild(tr);
            calculateRow(tr.querySelector('.w'));
        }

        function removeRow(btn) {
            const tbody = document.getElementById('quoteBody');
            if (tbody.children.length > 1) {
                btn.closest('tr').remove();
                updateNumbers();
                calculateTotal();
            } else {
                alert('至少保留一行报价');
            }
        }

        function updateNumbers() {
            document.querySelectorAll('#quoteBody tr').forEach((row, i) => {
                row.querySelector('.seq').textContent = i + 1;
            });
        }

        function previewImage(input) {
            const file = input.files[0];
            const img = input.closest('.image-cell').querySelector('.image-thumb');
            if (file && img) {
                const reader = new FileReader();
                reader.onload = e => { img.src = e.target.result; img.style.display = 'block'; };
                reader.readAsDataURL(file);
            } else if (img) {
                img.style.display = 'none';
                img.src = PLACEHOLDER_IMAGE_URL;
            }
        }

        function previewQR(input) {
            const file = input.files[0];
            const img = input.closest('.qr-upload').querySelector('.qr-thumb');
            if (file && img) {
                const reader = new FileReader();
                reader.onload = e => { img.src = e.target.result; img.classList.add('show'); };
                reader.readAsDataURL(file);
            }
        }

        function setCurrentDate() {
            const d = new Date();
            document.getElementById('currentDate').textContent =
                `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
        }

        function exportExcel() {
            const wb = XLSX.utils.book_new();
            const wsData = [
                ['艺达·ART报价单'], [],
                ['报价单位:', document.getElementById('studioName').value, '', '联系电话:', document.getElementById('contactPhone').value],
                ['客户名称:', document.getElementById('customerName').value || '未填写', '', '联系地址:', document.getElementById('customerAddress').value || '未填写'],
                [],
                ['序号','画作形式','参数','作品尺寸(cm)','数量','平方小计(m²)','价格(￥)']
            ];
            document.querySelectorAll('#quoteBody tr').forEach(row => {
                const params = [
                    `画芯: ${row.querySelector('.core').value}`,
                    `画布: ${row.querySelector('.canvas').value}`,
                    `外框: ${row.querySelector('.outer').value}`,
                    `内框: ${row.querySelector('.inner').value}`
                ].join('; ');
                wsData.push([
                    row.querySelector('.seq').textContent,
                    row.querySelector('.art-type').value,
                    params,
                    `${row.querySelector('.w').value}×${row.querySelector('.h').value}`,
                    row.querySelector('.q').value,
                    row.querySelector('.area').textContent,
                    row.querySelector('.price').value
                ]);
            });
            wsData.push([], ['合计', '', '', '', document.getElementById('totalArea').textContent + ' m²', '￥' + document.getElementById('totalPrice').textContent]);
            wsData.push([], ['报价人:', document.getElementById('quoter').value || '未填写', '', '报价日期:', document.getElementById('currentDate').textContent]);
            wsData.push(['公司地址: 福建省福州市仓山区建新镇后巷路2号', '', '', '联系电话:', document.getElementById('footerContactPhone').value]);

            const ws = XLSX.utils.aoa_to_sheet(wsData);
            ws['!cols'] = [{wch:6},{wch:12},{wch:40},{wch:14},{wch:6},{wch:14},{wch:12}];
            XLSX.utils.book_append_sheet(wb, ws, '报价单');
            XLSX.writeFile(wb, `报价单_${document.getElementById('currentDate').textContent}.xlsx`);
        }

        function exportPNG() {
            const container = document.querySelector('.container');
            document.body.style.overflow = 'hidden';
            container.classList.add('hide-for-export');

            const inputs = container.querySelectorAll('input[type="text"], input[type="number"], select');
            const replacements = [];
            inputs.forEach(input => {
                const span = document.createElement('span');
                span.textContent = input.value || '未填写';
                span.style.cssText = input.style.cssText + 'display:inline-block;padding:9px 12px;font-size:13px;font-family:inherit';
                input.parentNode.replaceChild(span, input);
                replacements.push({ input, span });
            });

            html2canvas(container, { scale: 2, useCORS: true, backgroundColor: '#ffffff' }).then(canvas => {
                container.classList.remove('hide-for-export');
                replacements.forEach(({ input, span }) => span.parentNode.replaceChild(input, span));
                document.body.style.overflow = 'auto';
                const a = document.createElement('a');
                a.download = `报价单_${document.getElementById('currentDate').textContent}.png`;
                a.href = canvas.toDataURL('image/png');
                a.click();
            }).catch(err => {
                container.classList.remove('hide-for-export');
                replacements.forEach(({ input, span }) => span.parentNode.replaceChild(input, span));
                document.body.style.overflow = 'auto';
                console.error(err);
            });
        }

        document.addEventListener('DOMContentLoaded', () => {
            setCurrentDate();
            addRow();
            const params = new URLSearchParams(window.location.search);
            const w = params.get('width'), h = params.get('height');
            if (w && h) {
                const first = document.querySelector('#quoteBody tr');
                first.querySelector('.w').value = w;
                first.querySelector('.h').value = h;
                calculateRow(first.querySelector('.w'));
            }
        });
    </script>
</head>
<body>
    <header>
        <h1>艺达·<span>ART</span> 报价单</h1>
        <nav>
            <a href="./index.html">智能挂画系统</a>
            <a href="./quote.html" class="active">生成报价单</a>
        </nav>
    </header>

    <div class="container">
        <div class="card" style="margin-bottom:24px">
            <div class="info-grid">
                <div class="form-group">
                    <label>报价单位</label>
                    <select id="studioName">
                        <option value="三千·ART">三千·ART</option>
                        <option value="艺达·ART" selected>艺达·ART</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>联系电话</label>
                    <input type="text" id="contactPhone" value="18059018257">
                </div>
                <div class="form-group">
                    <label>客户名称</label>
                    <input type="text" id="customerName" placeholder="请输入">
                </div>
                <div class="form-group">
                    <label>联系地址</label>
                    <input type="text" id="customerAddress" placeholder="请输入">
                </div>
                <div class="form-group">
                    <label>客户微信</label>
                    <input type="text" id="customerWechat" placeholder="请输入">
                </div>
            </div>
        </div>

        <div class="card">
            <div class="card-header">
                <h2>画作清单</h2>
                <div class="btn-group" style="padding:0;border:none;box-shadow:none">
                    <button class="btn btn-secondary" onclick="addRow()">+ 添加画作</button>
                    <button class="btn btn-secondary" onclick="exportExcel()">导出 Excel</button>
                    <button class="btn btn-primary" onclick="exportPNG()">导出 PNG</button>
                </div>
            </div>

            <div class="remark">以下报价作为参考，如有疑问请与我们联络</div>

            <div class="table-wrap">
                <table>
                    <thead>
                        <tr>
                            <th class="seq">序号</th>
                            <th class="type">画作形式</th>
                            <th class="params">参数</th>
                            <th class="size">作品尺寸(cm)</th>
                            <th class="qty">数量</th>
                            <th class="area">平方(m²)</th>
                            <th class="price">价格(￥)</th>
                            <th class="image">画芯</th>
                            <th class="action"></th>
                        </tr>
                    </thead>
                    <tbody id="quoteBody"></tbody>
                </table>
            </div>

            <div class="total-box">
                <div class="total-inner">
                    <div class="total-row">
                        <span class="label">合计平方数</span>
                        <span class="value"><span id="totalArea">0.00</span> m²</span>
                    </div>
                    <div class="total-row">
                        <span class="label">合计小写</span>
                        <span class="value">￥<span id="totalPrice">0</span></span>
                    </div>
                    <div class="total-row big">
                        <span class="label">合计大写</span>
                        <span class="value" id="totalPriceCN">零元</span>
                    </div>
                </div>
            </div>

            <div class="footer-grid">
                <div class="footer-field">
                    <label>报价人</label>
                    <input type="text" id="quoter" class="inline-input" value="陈睿" placeholder="请输入">
                </div>
                <div class="footer-field">
                    <label>报价日期</label>
                    <span id="currentDate" class="static-text"></span>
                </div>
                <div class="footer-field">
                    <label>联系电话</label>
                    <input type="text" id="footerContactPhone" class="inline-input" value="18059018257">
                </div>
            </div>

            <div class="contact-card">
                <div class="contact-item">
                    <label>微信</label>
                    <span class="value wechat" id="wechatDisplay">请扫码添加</span>
                </div>
                <div class="contact-item">
                    <label>电话</label>
                    <span class="value">18059018257</span>
                </div>
                <div class="contact-item">
                    <label>地址</label>
                    <span class="value addr">福建省福州市仓山区建新镇后巷路2号</span>
                </div>
                <div class="qr-upload">
                    <label>二维码</label>
                    <div class="upload-btn">
                        上传微信二维码
                        <input type="file" accept="image/*" onchange="previewQR(this)">
                    </div>
                    <img class="qr-thumb" src="" alt="微信二维码">
                </div>
            </div>
        </div>
    </div>
</body>
</html>
