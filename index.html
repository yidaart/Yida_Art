<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>艺达·ART丨智能挂画系统</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f5f3f0;
            --surface: #ffffff;
            --surface-raised: #faf9f7;
            --text: #1a1a1a;
            --text-secondary: #666;
            --text-muted: #999;
            --accent: #8b5a2b;
            --accent-light: #c49a6c;
            --accent-soft: rgba(139,90,43,0.08);
            --border: #e5e0da;
            --border-light: #f0ebe5;
            --shadow: 0 2px 8px rgba(0,0,0,0.06);
            --shadow-lg: 0 8px 32px rgba(0,0,0,0.1);
            --radius: 12px;
            --radius-sm: 8px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            min-height: 100vh;
        }

        header {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 18px 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        header h1 {
            font-family: 'Cormorant Garamond', Georgia, serif;
            font-size: 24px;
            font-weight: 500;
        }
        header h1 span { color: var(--accent); }
        header nav { display: flex; gap: 10px; }
        header nav a {
            color: var(--text-secondary);
            text-decoration: none;
            padding: 6px 16px;
            border-radius: 999px;
            font-size: 13px;
            font-weight: 500;
            transition: all 0.2s;
            border: 1px solid var(--border);
        }
        header nav a:hover { border-color: var(--accent-light); color: var(--accent); }
        header nav a.active { background: var(--accent-soft); border-color: var(--accent); color: var(--accent); }

        .container {
            max-width: none;
            width: 100%;
            margin: 0 auto;
            padding: 32px 40px;
            box-sizing: border-box;
        }

        @media (min-width: 1400px) {
            .container { padding: 32px 80px; }
        }

        .main-grid {
            display: grid;
            grid-template-columns: 380px 1fr;
            gap: 28px;
        }

        .card {
            background: var(--surface);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
        }

        .card-header {
            padding: 18px 22px;
            border-bottom: 1px solid var(--border-light);
        }
        .card-header h2 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 17px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .card-header h2::before {
            content: '';
            width: 3px;
            height: 16px;
            background: var(--accent);
            border-radius: 2px;
        }
        .card-body { padding: 22px; }

        .form-group { margin-bottom: 18px; }
        .form-group:last-child { margin-bottom: 0; }

        label {
            display: block;
            font-size: 11px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }

        input[type="number"] {
            width: 100%;
            padding: 11px 13px;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            font-size: 14px;
            background: var(--surface);
            transition: border-color 0.2s;
        }
        input:focus { outline: none; border-color: var(--accent); }

        .scene-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            margin-bottom: 18px;
        }
        .scene-btn {
            padding: 10px 6px;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            background: var(--surface-raised);
            cursor: pointer;
            text-align: center;
            transition: all 0.2s;
        }
        .scene-btn:hover { border-color: var(--accent-light); }
        .scene-btn.active { border-color: var(--accent); background: var(--accent-soft); }
        .scene-btn .icon { font-size: 18px; display: block; margin-bottom: 2px; }
        .scene-btn .label { font-size: 11px; color: var(--text-secondary); }
        .scene-btn.active .label { color: var(--accent); font-weight: 500; }

        .style-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin-bottom: 18px;
        }
        .style-btn {
            padding: 10px 8px;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            background: var(--surface-raised);
            cursor: pointer;
            text-align: center;
            transition: all 0.2s;
            font-size: 12px;
        }
        .style-btn:hover { border-color: var(--accent-light); }
        .style-btn.active { border-color: var(--accent); background: var(--accent-soft); color: var(--accent); }

        .result-box {
            background: linear-gradient(135deg, var(--accent-soft), var(--surface-raised));
            border-radius: var(--radius);
            padding: 18px;
            text-align: center;
            margin: 16px 0;
        }
        .result-box .size {
            font-family: 'Cormorant Garamond', serif;
            font-size: 28px;
            font-weight: 600;
            color: var(--accent);
        }
        .result-box .unit { font-size: 12px; color: var(--text-muted); margin-top: 4px; }
        .result-box .hang-height { font-size: 12px; color: var(--text-secondary); margin-top: 8px; }

        .ref-info {
            display: flex;
            justify-content: space-between;
            padding: 10px 14px;
            background: var(--surface-raised);
            border-radius: var(--radius-sm);
            font-size: 13px;
            margin-bottom: 16px;
        }
        .ref-info .val { color: var(--accent); font-weight: 500; }

        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }

        .upload-zone {
            border: 2px dashed var(--border);
            border-radius: var(--radius);
            padding: 22px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
        }
        .upload-zone:hover { border-color: var(--accent); background: var(--accent-soft); }
        .upload-zone .icon { font-size: 26px; margin-bottom: 6px; }
        .upload-zone p { font-size: 13px; color: var(--text-secondary); }
        .upload-zone .browse { color: var(--accent); font-weight: 500; }

        .more-toggle {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-secondary);
            border-top: 1px solid var(--border-light);
            margin-top: 16px;
        }
        .more-toggle .arrow { transition: transform 0.2s; font-size: 10px; }
        .more-toggle.open .arrow { transform: rotate(180deg); }
        .more-content { display: none; padding-top: 16px; }
        .more-content.open { display: block; }

        .frame-colors { display: flex; gap: 10px; margin-top: 10px; }
        .frame-color {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            border: 3px solid transparent;
            cursor: pointer;
            transition: all 0.2s;
        }
        .frame-color:hover, .frame-color.active {
            border-color: var(--accent);
            transform: scale(1.1);
        }

        .btn-primary {
            width: 100%;
            padding: 13px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: var(--radius-sm);
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            margin-top: 18px;
            transition: background 0.2s;
        }
        .btn-primary:hover { background: #7a4f26; }
        .btn-primary:disabled { background: var(--border); cursor: not-allowed; }

        .preview-card { position: sticky; top: 32px; }
        .preview-header {
            padding: 16px 22px;
            border-bottom: 1px solid var(--border-light);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .preview-header h3 { font-family: 'Cormorant Garamond', serif; font-size: 16px; }
        .status {
            font-size: 11px;
            color: var(--text-muted);
            background: var(--surface-raised);
            padding: 4px 12px;
            border-radius: 20px;
        }

        .preview-area {
            position: relative;
            background: #1a1a1a;
            min-height: 500px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .preview-empty { text-align: center; padding: 60px 40px; }
        .preview-empty .icon { font-size: 48px; opacity: 0.4; margin-bottom: 16px; }
        .preview-empty h4 { font-family: 'Cormorant Garamond', serif; font-size: 20px; margin-bottom: 8px; color: #fff; }
        .preview-empty p { font-size: 13px; color: #888; }

        .preview-main { display: none; position: relative; width: 100%; }
        .preview-main.show { display: block; }

        #canvas { width: auto; height: auto; display: block; }
        #canvas.calibrating { cursor: crosshair; }
        #canvas:not(.calibrating) { cursor: default; }
        #canvas.dragging { cursor: grabbing; }

        .size-tag {
            position: absolute;
            bottom: 14px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255,255,255,0.95);
            padding: 8px 18px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 500;
            color: var(--accent);
            box-shadow: var(--shadow);
            z-index: 5;
            display: none;
        }
        .size-tag.show { display: block; }

        .loading-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.8);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 20;
        }
        .loading-overlay.hidden { display: none; }
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #333;
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 16px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading-text { font-size: 14px; color: #fff; }

        .ai-suggestion {
            position: absolute;
            top: 14px;
            left: 14px;
            right: 70px;
            background: rgba(255,255,255,0.95);
            padding: 12px 14px;
            border-radius: var(--radius-sm);
            font-size: 12px;
            line-height: 1.6;
            box-shadow: var(--shadow);
            z-index: 5;
        }
        .ai-suggestion.hidden { display: none; }
        .ai-suggestion strong { color: var(--accent); }
        .ai-suggestion .meta {
            margin-top: 6px;
            color: var(--text-secondary);
            font-size: 11px;
        }

        .manual-panel {
            position: absolute;
            left: 14px;
            bottom: 64px;
            width: min(320px, calc(100% - 28px));
            background: rgba(255,255,255,0.96);
            border-radius: var(--radius-sm);
            padding: 14px;
            box-shadow: var(--shadow);
            z-index: 5;
            display: none;
        }
        .manual-panel.show { display: block; }
        .manual-title {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 12px;
            font-weight: 600;
            color: var(--text);
        }
        .manual-hint {
            font-size: 11px;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }
        .slider-group { margin-bottom: 10px; }
        .slider-group:last-child { margin-bottom: 0; }
        .slider-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 4px;
            font-size: 11px;
            color: var(--text-secondary);
        }
        .slider-group input[type="range"] {
            width: 100%;
            accent-color: var(--accent);
        }
        .manual-actions {
            display: flex;
            justify-content: flex-end;
            margin-top: 10px;
            gap: 8px;
            flex-wrap: wrap;
        }
        .manual-reset {
            border: 1px solid var(--border);
            background: var(--surface);
            color: var(--text-secondary);
            border-radius: 999px;
            padding: 6px 10px;
            font-size: 11px;
            cursor: pointer;
        }
        .manual-reset:hover {
            border-color: var(--accent-light);
            color: var(--accent);
        }
        .manual-reset.primary {
            border-color: var(--accent-light);
            color: var(--accent);
        }

        .preview-btns {
            position: absolute;
            bottom: 14px;
            right: 14px;
            display: flex;
            gap: 8px;
            z-index: 5;
        }
        .preview-btns.hidden { display: none; }
        .preview-btn {
            padding: 8px 14px;
            background: rgba(255,255,255,0.95);
            border: none;
            border-radius: var(--radius-sm);
            font-size: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            box-shadow: var(--shadow);
            transition: all 0.2s;
        }
        .preview-btn:hover { background: var(--accent); color: white; }

        @media (max-width: 1024px) {
            .main-grid { grid-template-columns: 1fr; }
            .preview-card { position: static; }
        }
        @media (max-width: 768px) {
            header { padding: 14px 20px; flex-direction: column; gap: 8px; }
            .container { padding: 20px; }
            .scene-grid { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>
    <header>
        <h1>艺达·<span>ART</span> 智能挂画系统</h1>

            <a href="./index.html" class="active">智能挂画系统</a>

        </nav>
    </header>

    <div class="container">
        <div class="main-grid">
            <!-- Sidebar -->
            <aside class="sidebar">
                <div class="card">
                    <div class="card-header"><h2>场景配置</h2></div>
                    <div class="card-body">
                        <div class="form-group">
                            <label>选择房间</label>
                            <div class="scene-grid">
                                <button class="scene-btn active" data-scene="livingRoom">
                                    <span class="icon">🛋️</span>
                                    <span class="label">客厅</span>
                                </button>
                                <button class="scene-btn" data-scene="bedroom">
                                    <span class="icon">🛏️</span>
                                    <span class="label">卧室</span>

                                <button class="scene-btn" data-scene="diningRoom">
                                    <span class="icon">🍽️</span>
                                    <span class="label">餐厅</span>
                                </button>
                                <button class="scene-btn" data-scene="entrance">
                                    <span class="icon">🚪</span>
                                    <span class="label">玄关</span>
                                </button>
                            </div>
                        </div>

                        <div class="form-group">
                            <label>选择风格</label>
                            <div class="style-grid">
                                <button class="style-btn active" data-style="long">长幅</button>
                                <button class="style-btn" data-style="square">方形</button>

                        <div class="more-content" id="moreContent">
                            <div class="form-group">
                                <label>画框颜色</label>
                                <div class="frame-colors">
                                    <div class="frame-color none-frame active" data-frame="none" title="无框"></div>
                                    <div class="frame-color" style="background:#1a1a1a" data-frame="black" title="黑色"></div>
                                    <div class="frame-color" style="background:linear-gradient(135deg,#c9a227,#a8850f)" data-frame="gold" title="金色"></div>

                        <button class="btn-primary" id="generateBtn">生成效果图</button>
                    </div>
                </div>
            </aside>

            <!-- Preview -->
            <section class="preview-card">
                <div class="card">

                                <div class="manual-title">
                                    <span>挂画位置微调</span>
                                    <button class="manual-reset" id="closeManualBtn" style="border:none;background:none;font-size:16px;cursor:pointer;padding:0;line-height:1">×</button>
                                </div>
                                <div class="manual-hint">拖动画作可微调位置。</div>
                                <div class="manual-hint" id="calibrateHint">如尺寸看起来不准，可点击“参考物校准”，依次点选参考物左右两端。</div>

                                        <span id="offsetXVal">0%</span>
                                    </div>
                                    <input type="range" id="offsetX" min="-20" max="20" value="0">
                                </div>

                                <div class="slider-group">
                                    <div class="slider-head">
                                        <span>上下微调</span>
                                        <span id="offsetYVal">0%</span>
                                    </div>
                                    <input type="range" id="offsetY" min="-20" max="20" value="0">

                                <div class="slider-group">
                                    <div class="slider-head">
                                        <span>墙面范围</span>

                            <div class="size-tag" id="sizeTag"></div>

                                <div class="spinner"></div>
                                <div class="loading-text" id="loadingText">正在生成效果图...</div>
                            </div>
                        </div>
                    </div>
                </div>
            </section>
        </div>
    </div>

        function getCanvasPointFromEvent(event) {
            const rect = canvas.getBoundingClientRect();

        function extractJsonFromText(text) {
            const fenced = text.match(/```(?:json)?\s*([\s\S]*?)```/i);
            if (fenced) return fenced[1].trim();

            const start = text.indexOf('{');
            const end = text.lastIndexOf('}');
            if (start !== -1 && end !== -1 && end > start) {
                return text.slice(start, end + 1);
            }
            return '';
        }

        function parseAIResponse(content, fallbackWall) {
            const raw = (content || '').trim();
            if (!raw) {
                return {
                    wall: fallbackWall,
                    description: 'AI 未返回有效内容，已使用默认墙面位置。',
                    source: 'fallback'
                };
            }

            const normalizedText = raw.replace(/\n+/g, ' ').trim();
            const jsonText = extractJsonFromText(raw);
            if (jsonText) {
                try {
                    const parsed = JSON.parse(jsonText);
                    const status = String(parsed.status || '').toLowerCase();
                    if (status === 'ok') {
                        return {
                            wall: fallbackWall,
                            description: parsed.reason || 'AI 认为当前挂画位置合适。',
                            source: 'ai-ok'
                        };
                    }

                    if (parsed.centerX != null && parsed.centerY != null) {
                        return {
                            wall: normalizeWallRegion({
                                centerX: parsed.centerX,
                                centerY: parsed.centerY,
                                width: parsed.wallWidth || fallbackWall.width,
                                height: parsed.wallHeight || fallbackWall.height
                            }, fallbackWall),
                            description: parsed.reason || 'AI 已修正挂画建议位置。',
                            source: 'ai-json'
                        };
                    }
                } catch (err) {
                    console.warn('Failed to parse AI JSON:', err);
                }
            }

            if (/^\s*ok[\s.!]*$/i.test(raw) || /位置基本正确|位置合适|返回成功|已收到/.test(raw)) {
                return {
                    wall: fallbackWall,
                    description: 'AI 认为当前候选位置基本合适。',
                    source: 'ai-ok'
                };
            }

            const ratioMatch = raw.match(/([01](?:\.\d+)?)\s*[,，]\s*([01](?:\.\d+)?)/);
            if (ratioMatch) {
                return {
                    wall: normalizeWallRegion({
                        centerX: parseFloat(ratioMatch[1]),
                        centerY: parseFloat(ratioMatch[2]),
                        width: fallbackWall.width,
                        height: fallbackWall.height
                    }, fallbackWall),
                    description: normalizedText,
                    source: 'ai-text'
                };
            }

            return {
                wall: fallbackWall,
                description: `AI 返回格式不稳定，已采用默认位置。原始返回：${normalizedText}`,
                source: 'fallback'
            };
        }

        function getAIContent(data) {

            if (Array.isArray(data.choices) && data.choices[0]) {

                if (first.message && typeof first.message.content === 'string') return first.message.content;

            return '';

        async function requestWithTimeout(url, options, timeoutMs = AI_TIMEOUT_MS) {

                displayHeight = roundToNearest(displayWidth * heightRatio, 10);

            const furnitureHeight = SCENE_FURNITURE_HEIGHT[currentScene] || 0;

            let hangHeight = 150;
            const minCenterHeight = furnitureHeight + spaceAbove + displayHeight / 2;
            const maxCenterHeight = wallH - 20 - displayHeight / 2;
            hangHeight = Math.max(hangHeight, minCenterHeight);
            hangHeight = Math.min(hangHeight, maxCenterHeight);
            hangHeight = roundToNearest(hangHeight, 10);

            return { width: displayWidth, height: displayHeight, hangHeight };

        async function analyzeRoomWithAI(img) {
            console.log('Starting AI wall analysis...');

            // 缩小图片以节省 token
            const canvas = document.createElement('canvas');
            const maxSize = 768;
            const scale = Math.min(1, maxSize / Math.max(img.naturalWidth, img.naturalHeight));

            const candidateCY = Math.round(canvas.height * fallbackWall.centerY);
            const candidateW = Math.round(canvas.width * fallbackWall.width);
            const candidateH = Math.round(canvas.height * fallbackWall.height);
            ctx2.strokeStyle = '#ff6b6b';
            ctx2.lineWidth = 3;
            ctx2.setLineDash([8, 4]);
            ctx2.strokeRect(candidateCX - candidateW / 2, candidateCY - candidateH / 2, candidateW, candidateH);
            ctx2.setLineDash([]);
            // 中心点标记
            ctx2.fillStyle = '#ff6b6b';
            ctx2.beginPath();
            ctx2.arc(candidateCX, candidateCY, 6, 0, Math.PI * 2);
            ctx2.fill();
            const markedImage = canvas.toDataURL('image/jpeg', 0.85);

            const prompt = `这是一张${sceneName}照片。
红色虚线框是我预估的挂画位置。
推荐画框尺寸约为 ${dims.width} x ${dims.height} cm。
请只返回 JSON，不要输出任何额外说明。
如果红框位置基本正确，返回：
{"status":"ok","reason":"一句简短中文说明"}
如果需要调整位置，返回：
{"status":"adjust","centerX":0.50,"centerY":0.38,"wallWidth":0.52,"wallHeight":0.28,"reason":"一句简短中文说明"}
要求：
1. 所有坐标和尺寸都使用 0 到 1 之间的图片比例
2. centerX / centerY 表示建议挂画中心点
3. wallWidth / wallHeight 表示适合挂画区域的大致占比`;

            const response = await requestWithTimeout('https://api.minimaxi.com/v1/coding_plan/vlm', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': 'Bearer ' + API_KEY

            if (!response.ok) {
                const errText = await response.text();
                console.error('API error:', errText);
                throw new Error('API request failed: ' + response.status);
            }

            const data = await response.json();
            console.log('AI response:', data);
            const content = getAIContent(data).trim();
            return parseAIResponse(content, fallbackWall);
        }

        // 求解单应性矩阵 (Homography)
        function solveHomography(src, dst) {
            const A = [];
            for (let i = 0; i < 4; i++) {
                const [sx, sy] = src[i];
                const [dx, dy] = dst[i];
                A.push([-sx, -sy, -1, 0, 0, 0, sx*dx, sy*dx, dx]);
                A.push([0, 0, 0, -sx, -sy, -1, sx*dy, sy*dy, dy]);
            }

            // 计算 A^T A
            const AtA = [];
            for (let i = 0; i < 9; i++) {
                AtA[i] = [];
                for (let j = 0; j < 9; j++) {
                    let sum = 0;
                    for (let k = 0; k < 8; k++) sum += A[k][i] * A[k][j];
                    AtA[i][j] = sum;
                }
            }

            // 幂迭代求特征向量
            let v = new Array(9).fill(1);
            for (let iter = 0; iter < 100; iter++) {
                const newV = [];
                for (let i = 0; i < 9; i++) {
                    let s = 0;
                    for (let j = 0; j < 9; j++) s += AtA[i][j] * v[j];
                    newV.push(s);
                }
                const norm = Math.sqrt(newV.reduce((s, x) => s + x*x, 0));
                v = newV.map(x => x / norm);
            }

            const s = v[8] || 1;
            return [[v[0]/s, v[1]/s, v[2]/s], [v[3]/s, v[4]/s, v[5]/s], [v[6]/s, v[7]/s, 1]];
        }

        // 透视变换渲染
        function renderPreview() {
            if (!aiResult || !roomImage) return;

            const imgW = roomImage.naturalWidth;
            const imgH = roomImage.naturalHeight;
            const dims = calculatedDimensions || getRecommendedDimensions();

            canvas.width = imgW;
            canvas.height = imgH;

            // 绘制原图（保持原始比例）
            ctx.drawImage(roomImage, 0, 0, imgW, imgH);

            const wall = getAdjustedWall(aiResult.wall);
            const wallCX = wall.centerX * imgW;
            const wallCY = wall.centerY * imgH;
            const wallPW = wall.width * imgW;

            // 计算 pxPerCm：墙面实际宽度(用户输入) / 墙面像素宽度
            // 这样画作尺寸直接按真实厘米换算成像素
            const userWallW = parseFloat(wallWidthInput.value) || 350;
            const pxPerCm = calibration.pxPerCm || Math.max(wallPW / userWallW, 0.1);
            const paintW = dims.width * pxPerCm;
            const paintH = dims.height * pxPerCm;

            // 画作中心点（直接用墙面中心）
            const paintCenterX = wallCX;
            const paintCenterY = wallCY;

            console.log('DEBUG:', {
                userWallW, wallPW, pxPerCm,
                dims: dims,
                paintW, paintH,
                paintCenterX, paintCenterY
            });

            // 保存状态
            ctx.save();

            // 绘制阴影
            ctx.shadowColor = 'rgba(0,0,0,0.25)';
            ctx.shadowBlur = 15;
            ctx.shadowOffsetX = 4;
            ctx.shadowOffsetY = 4;

            // 画框背景（比画芯大，往外偏移 frameW）
            const frameW = paintW * 0.04;
            if (selectedFrame !== 'none' && FRAME_COLORS[selectedFrame]) {
                const halfW = paintW / 2 + frameW;
                const halfH = paintH / 2 + frameW;
                ctx.fillStyle = FRAME_COLORS[selectedFrame];
                ctx.fillRect(paintCenterX - halfW, paintCenterY - halfH, halfW * 2, halfH * 2);
            }

            // 画芯（使用 drawImage 直接绘制，简单可靠）
            if (paintImage) {
                ctx.drawImage(paintImage,
                    paintCenterX - paintW/2,
                    paintCenterY - paintH/2,
                    paintW,
                    paintH
                );
            } else {
                // 无画芯时绘制纯色
                ctx.fillStyle = '#e8e4df';
                ctx.fillRect(paintCenterX - paintW/2, paintCenterY - paintH/2, paintW, paintH);
            }

            ctx.restore();

            if (calibration.points.length) {
                ctx.save();
                ctx.strokeStyle = '#8b5a2b';
                ctx.fillStyle = '#ffffff';
                ctx.lineWidth = 3;
                if (calibration.points.length === 2) {
                    ctx.beginPath();
                    ctx.moveTo(calibration.points[0].x, calibration.points[0].y);
                    ctx.lineTo(calibration.points[1].x, calibration.points[1].y);
                    ctx.stroke();
                }
                calibration.points.forEach((point, index) => {
                    ctx.beginPath();
                    ctx.arc(point.x, point.y, 7, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.stroke();
                    ctx.fillStyle = '#8b5a2b';
                    ctx.font = '14px Inter';
                    ctx.fillText(index === 0 ? '1' : '2', point.x + 10, point.y - 10);
                    ctx.fillStyle = '#ffffff';
                });
                ctx.restore();
            }

            // 更新UI
            sizeTag.textContent = dims.width + '×' + dims.height + ' cm';
            sizeTag.classList.add('show');

            const sourceLabel = {
                'ai-json': 'AI 已修正',
                'ai-text': 'AI 已修正',
                'ai-ok': 'AI 认可',
                'fallback': '默认位置'
            }[aiResult.source] || 'AI 建议';

            aiSuggestion.innerHTML = `
                <strong>${dims.width}×${dims.height}cm</strong><br>
                ${aiResult.description || ''}
                <div class="meta">${SCENE_LABELS[currentScene].replace('宽度（cm）', '')} · ${STYLE_NAMES[currentStyle]}</div>
            `;
            aiSuggestion.classList.remove('hidden');
        }

        // 绘制带仿射变换的三角形
        function drawTexturedTriangle(ctx, img, x0, y0, x1, y1, x2, y2, dx0, dy0, dx1, dy1, dx2, dy2) {
            ctx.save();
            ctx.beginPath();
            ctx.moveTo(dx0, dy0);
            ctx.lineTo(dx1, dy1);
            ctx.lineTo(dx2, dy2);
            ctx.closePath();
            ctx.clip();

            // 计算仿射变换矩阵：标准三点映射公式
            // 源三角 (x0,y0),(x1,y1),(x2,y2) -> 目标三角 (dx0,dy0),(dx1,dy1),(dx2,dy2)
            // 行列式: |x0 y0 1; x1 y1 1; x2 y2 1|
            const det = x0*(y1-y2) - y0*(x1-x2) + x1*y2 - x2*y1;

            const a0 = (dx0*(y1-y2) + dx1*(y2-y0) + dx2*(y0-y1)) / det;
            const a1 = (dx0*(x2-x1) + dx1*(x0-x2) + dx2*(x1-x0)) / det;
            const a2 = (dx0*(x1*y2-x2*y1) + dx1*(x2*y0-x0*y2) + dx2*(x0*y1-x1*y0)) / det;

            const b0 = (dy0*(y1-y2) + dy1*(y2-y0) + dy2*(y0-y1)) / det;
            const b1 = (dy0*(x2-x1) + dy1*(x0-x2) + dy2*(x1-x0)) / det;
            const b2 = (dy0*(x1*y2-x2*y1) + dy1*(x2*y0-x0*y2) + dy2*(x0*y1-x1*y0)) / det;

            // ctx.setTransform(a, b, c, d, e, f) = [a c e; b d f; 0 0 1] in column-major
            // Maps to: u = a*x + c*y + e, v = b*x + d*y + f
            // We want: u = a0*x + a1*y + a2, v = b0*x + b1*y + b2
            ctx.setTransform(a0, b0, a1, b1, a2, b2);
            ctx.drawImage(img, 0, 0);
            ctx.restore();
        }

        function showLoading(text) {
            loadingText.textContent = text;
            loadingOverlay.classList.remove('hidden');
        }

        function hideLoading() {
            loadingOverlay.classList.add('hidden');
        }

        generateBtn.addEventListener('click', () => {
            console.log('Generate button clicked, roomImage:', !!roomImage);
            if (!roomImage) {
                alert('请先上传房间照片');
                return;
            }
            generateEffect();
        });

        resetBtn.addEventListener('click', () => {
            roomInput.value = '';
            paintingInput.value = '';
            roomImage = null;
            paintImage = null;
            aiResult = null;
            resetManualAdjust();
            clearCalibration();
            canvas.width = 0;
            canvas.height = 0;
            emptyState.style.display = 'block';
            previewMain.classList.remove('show');
            aiSuggestion.classList.add('hidden');
            previewBtns.classList.add('hidden');
            manualPanel.classList.remove('show');
            sizeTag.classList.remove('show');
            statusText.textContent = '上传照片开始';
        });

        regenBtn.addEventListener('click', () => {
            if (roomImage) generateEffect();
        });

        downBtn.addEventListener('click', () => {
            if (!canvas.width) return;
            const link = document.createElement('a');
            link.download = 'art-preview.png';
            link.href = canvas.toDataURL('image/png');
            link.click();
        });

        [offsetXSlider, offsetYSlider, wallScaleSlider].forEach(input => {
            input.addEventListener('input', () => {
                manualAdjust = {
                    offsetX: parseFloat(offsetXSlider.value) / 100,
                    offsetY: parseFloat(offsetYSlider.value) / 100,
                    scale: parseFloat(wallScaleSlider.value) / 100
                };
                updateManualLabels();
                if (aiResult) renderPreview();
            });
        });

        resetAdjustBtn.addEventListener('click', () => {
            resetManualAdjust(true);
        });

        startCalibrateBtn.addEventListener('click', () => {
            startCalibration();
        });

        clearCalibrateBtn.addEventListener('click', () => {
            clearCalibration(true);
        });

        closeManualBtn.addEventListener('click', () => {
            manualPanel.classList.remove('show');
        });

        canvas.addEventListener('click', (event) => {
            if (!calibration.active || !roomImage) return;

            const point = getCanvasPointFromEvent(event);
            calibration.points.push(point);

            if (calibration.points.length === 1) {
                statusText.textContent = '校准中：点击右端';
                calibrateHint.textContent = `已记录第 1 个点，请点击${refLabel.textContent.replace('（cm）', '')}的另一端。`;
                renderPreview();
                return;
            }

            const [p1, p2] = calibration.points;
            const distance = Math.hypot(p2.x - p1.x, p2.y - p1.y);
            const refCm = parseFloat(refWidth.value) || 100;
            calibration.pxPerCm = distance > 0 ? distance / refCm : null;
            calibration.active = false;
            canvas.classList.remove('calibrating');
            statusText.textContent = calibration.pxPerCm ? '已完成参考物校准' : '校准失败';
            calibrateHint.textContent = calibration.pxPerCm
                ? `已按${refLabel.textContent.replace('（cm）', '')}${refCm}cm完成校准，当前出图会优先采用真实参考物比例。`
                : '校准失败，请重新点击参考物两端。';
            renderPreview();
        });

        // 画作拖拽移动
        canvas.addEventListener('mousedown', (event) => {
            if (!aiResult || !roomImage) return;
            if (calibration.active) return;

            const point = getCanvasPointFromEvent(event);
            const dims = calculatedDimensions || getRecommendedDimensions();
            const wall = getAdjustedWall(aiResult.wall);
            const imgW = roomImage.naturalWidth;
            const imgH = roomImage.naturalHeight;
            const wallPW = wall.width * imgW;
            const userWallW = parseFloat(wallWidthInput.value) || 350;
            const pxPerCm = calibration.pxPerCm || Math.max(wallPW / userWallW, 0.1);
            const paintW = dims.width * pxPerCm;
            const paintH = dims.height * pxPerCm;
            const wallCX = wall.centerX * imgW;
            const wallCY = wall.centerY * imgH;

            // 判断点击是否在画作范围内
            if (point.x >= wallCX - paintW/2 - 20 && point.x <= wallCX + paintW/2 + 20 &&
                point.y >= wallCY - paintH/2 - 20 && point.y <= wallCY + paintH/2 + 20) {
                dragState.active = true;
                dragState.startX = point.x;
                dragState.startY = point.y;
                dragState.startOffsetX = manualAdjust.offsetX;
                dragState.startOffsetY = manualAdjust.offsetY;
                canvas.classList.add('dragging');
            }
        });

        canvas.addEventListener('mousemove', (event) => {
            if (!dragState.active) return;

            const point = getCanvasPointFromEvent(event);
            const dx = point.x - dragState.startX;
            const dy = point.y - dragState.startY;

            if (roomImage) {
                manualAdjust.offsetX = clamp(dragState.startOffsetX + dx / roomImage.naturalWidth, -0.2, 0.2);
                manualAdjust.offsetY = clamp(dragState.startOffsetY + dy / roomImage.naturalHeight, -0.2, 0.2);

                offsetXSlider.value = Math.round(manualAdjust.offsetX * 100);
                offsetYSlider.value = Math.round(manualAdjust.offsetY * 100);
                updateManualLabels();
                renderPreview();
            }
        });

        canvas.addEventListener('mouseup', () => {
            if (dragState.active) {
                dragState.active = false;
                canvas.classList.remove('dragging');
            }
        });

        canvas.addEventListener('mouseleave', () => {
            if (dragState.active) {
                dragState.active = false;
                canvas.classList.remove('dragging');
            }
        });

        updateRecommendation();
        updateManualLabels();
        console.log('Script initialized');
    </script>
</body>
</html>
